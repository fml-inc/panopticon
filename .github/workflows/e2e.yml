name: E2E Integration Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: E2E — sync data-loss validation

    steps:
      - name: Check for API keys
        id: check_keys
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ] && \
             [ -z "${{ secrets.OPENAI_API_KEY }}" ] && \
             [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ No API keys available — skipping"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check_keys.outputs.has_key == 'true'
        uses: actions/checkout@v4

      - name: Run E2E test
        if: steps.check_keys.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          docker compose -f test/e2e/docker-compose.yml \
            up --build --abort-on-container-exit \
            --exit-code-from test-${{ matrix.tool }}

  e2e-grafana:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: E2E — grafana sync

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Grafana sync E2E test
        run: |
          docker compose -f test/e2e/docker-compose.yml \
            --profile grafana \
            up --build --abort-on-container-exit \
            --exit-code-from test-grafana

  e2e-sync-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: E2E — sync data-loss validation

    steps:
      - name: Check for API keys
        id: check_keys
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ] && \
             [ -z "${{ secrets.OPENAI_API_KEY }}" ] && \
             [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ No API keys available — skipping sync validation"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check_keys.outputs.has_key == 'true'
        uses: actions/checkout@v4

      - name: Run sync validation E2E test
        if: steps.check_keys.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          docker compose -f test/e2e/docker-compose.yml \
            --profile sync-validation \
            up --build --abort-on-container-exit \
            --exit-code-from test-sync-validation
