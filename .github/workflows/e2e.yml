name: E2E Integration Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        tool: [claude, gemini, codex]
        include:
          - tool: claude
            secret_name: ANTHROPIC_API_KEY
            env_var: ANTHROPIC_API_KEY
          - tool: gemini
            secret_name: GOOGLE_API_KEY
            env_var: GOOGLE_API_KEY
          - tool: codex
            secret_name: OPENAI_API_KEY
            env_var: OPENAI_API_KEY

    name: E2E — ${{ matrix.tool }}

    steps:
      - name: Check for API key
        id: check_key
        run: |
          if [ -z "${{ secrets[matrix.secret_name] }}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ ${{ matrix.secret_name }} not available — skipping"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check_key.outputs.has_key == 'true'
        uses: actions/checkout@v4

      - name: Run E2E test
        if: steps.check_key.outputs.has_key == 'true'
        env:
          ${{ matrix.env_var }}: ${{ secrets[matrix.secret_name] }}
        run: |
          docker compose -f test/e2e/docker-compose.yml \
            --profile ${{ matrix.tool }} \
            up --build --abort-on-container-exit \
            --exit-code-from test-${{ matrix.tool }}
