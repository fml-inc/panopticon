name: E2E

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  sync-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: E2E — sync data-loss validation

    steps:
      - name: Check for API keys
        id: check_keys
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ] && \
             [ -z "${{ secrets.OPENAI_API_KEY }}" ] && \
             [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ No API keys available — skipping"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check_keys.outputs.has_key == 'true'
        uses: actions/checkout@v4

      - name: Run E2E test
        if: steps.check_keys.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          docker compose -f test/e2e/docker-compose.yml \
            up --build --abort-on-container-exit \
            --exit-code-from test-sync-validation

  pi-extension:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: E2E — Pi extension capture

    steps:
      - name: Check for Anthropic API key
        id: check_key
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ No ANTHROPIC_API_KEY available — skipping"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check_key.outputs.has_key == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.check_key.outputs.has_key == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Run Pi extension E2E test
        if: steps.check_key.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          docker compose -f test/e2e/docker-compose.yml \
            up --build --abort-on-container-exit \
            --exit-code-from test-pi-extension \
            test-pi-extension
