name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com

      - run: pnpm install --frozen-lockfile

      - name: Set dev version (non-tag builds)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          LATEST=$(npm view @fml-inc/panopticon version --registry https://npm.pkg.github.com 2>/dev/null || echo "0.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          PATCH=$((PATCH + 1))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          pnpm pkg set "version=${VERSION}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Publishing version: ${VERSION}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set release version (tagged builds)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          pnpm pkg set "version=${VERSION}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Publishing release version: ${VERSION}"

      - name: Lint & format
        run: pnpm biome ci src/

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm run build

      - name: Publish to GitHub Packages
        run: pnpm publish --no-git-checks --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag release
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
