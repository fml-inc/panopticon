name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint & format
        run: pnpm biome ci src/

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm run build

  integration:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -f test/integration/Dockerfile -t panopticon-integ-test .

      - name: Run integration tests
        run: docker run --rm panopticon-integ-test
