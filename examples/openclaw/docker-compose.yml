# OpenClaw + Panopticon — capture every API call, tool execution, and token
# spent by an OpenClaw agent into Panopticon's local database.
#
# Quick:  cp .env.example .env && ./setup.sh
# Manual: docker compose up -d
#
# For visualization, query panopticon directly:
#   docker exec panopticon node /app/bin/panopticon query "SELECT ..."
# Or wire Grafana separately via examples/grafana/.

services:
  # Panopticon — receives OTLP from OpenClaw, stores in SQLite
  panopticon:
    build:
      context: ../..
      dockerfile: examples/openclaw/Dockerfile.panopticon
    container_name: panopticon
    ports:
      - "4318:4318"      # OTLP + hooks + proxy
    volumes:
      - panopticon-data:/data
    environment:
      - PANOPTICON_DATA_DIR=/data
      - PANOPTICON_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4318/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # One-shot init: chown the openclaw volumes to uid 1000 (the `node` user
  # openclaw runs as). Docker creates named-volume mount points as root
  # when the target path doesn't exist in the image, which causes openclaw
  # to EACCES on every config write. We run as root in this init service
  # specifically to fix perms before the main container starts.
  openclaw-init:
    image: alpine:3
    command: sh -c "chown -R 1000:1000 /config /workspace"
    volumes:
      - openclaw-config:/config
      - openclaw-workspace:/workspace
    restart: "no"

  # OpenClaw gateway — multi-provider (Kimi + Claude).
  # Configured by setup.sh to enable diagnostics-otel → panopticon:4318,
  # AND to rewrite each provider's baseUrl to panopticon's proxy so full
  # request/response bodies are captured.
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    ports:
      - "18789:18789"    # OpenClaw web UI
    volumes:
      - openclaw-config:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    environment:
      # At least one of these must be set — setup.sh enforces that. Individual
      # providers are configured only if their key is present.
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      panopticon:
        condition: service_healthy
      openclaw-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  openclaw-config:
  openclaw-workspace:
  panopticon-data:
