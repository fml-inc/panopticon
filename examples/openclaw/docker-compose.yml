# OpenClaw + Panopticon + Grafana — end-to-end observability stack.
# See README.md for full setup instructions.
#
# Quick:  cp .env.example .env && ./setup.sh
# Manual: docker compose up -d

services:
  # OpenClaw gateway — AI agent with Kimi (Moonshot AI)
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    ports:
      - "18789:18789"    # OpenClaw web UI
    volumes:
      - openclaw-config:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    environment:
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      # Point OpenClaw's OTel diagnostics at Panopticon
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://panopticon:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
    depends_on:
      panopticon:
        condition: service_healthy
    restart: unless-stopped

  # Panopticon — captures telemetry from OpenClaw
  panopticon:
    build:
      context: ../..
      dockerfile: examples/openclaw/Dockerfile.panopticon
    container_name: panopticon
    ports:
      - "4318:4318"      # OTLP + hooks + proxy
    volumes:
      - panopticon-data:/data
    environment:
      - PANOPTICON_DATA_DIR=/data
      - PANOPTICON_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4318/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Grafana OTEL LGTM — visualizes the data
  grafana:
    image: grafana/otel-lgtm:latest
    container_name: grafana
    ports:
      - "3001:3000"      # Grafana UI
      - "14318:4318"     # OTLP receiver (for panopticon sync)
    restart: unless-stopped

volumes:
  openclaw-config:
  openclaw-workspace:
  panopticon-data:
