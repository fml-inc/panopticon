# Grafana OTEL LGTM stack for Panopticon sync.
# See README.md in this directory for full setup instructions.
#
# Quick:  ./examples/grafana/setup.sh
# Manual: docker compose -f examples/grafana/docker-compose.yml up -d

services:
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: panopticon-otel
    ports:
      - "3001:3000"   # Grafana UI
      - "14318:4318"  # OTLP HTTP receiver
    restart: unless-stopped
