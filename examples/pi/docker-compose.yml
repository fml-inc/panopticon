# Pi + Panopticon — capture session events from a Pi coding agent into
# Panopticon's local database.
#
# Pi emits events via a TypeScript extension that POSTs to panopticon's
# /hooks endpoint. No OTel SDK is involved — just the extension's HTTP
# fire-and-forget posts.
#
# Quick:  cp .env.example .env && ./setup.sh
# Manual: docker compose up -d

services:
  # Panopticon — receives hook events from Pi extension, stores in SQLite
  panopticon:
    build:
      context: ../..
      dockerfile: examples/pi/Dockerfile.panopticon
    container_name: panopticon
    ports:
      - "4318:4318"      # Hooks endpoint
    volumes:
      - panopticon-data:/data
    environment:
      - PANOPTICON_DATA_DIR=/data
      - PANOPTICON_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4318/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Pi — terminal coding harness with panopticon extension installed.
  # The extension emits session events to panopticon:4318/hooks.
  pi:
    image: node:24-slim
    container_name: pi
    volumes:
      - pi-workspace:/workspace
      - ../../dist:/opt/panopticon/dist:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PI_EXTENSIONS_DIR=/app/extensions
    working_dir: /workspace
    # The setup script installs pi and copies the extension into the container.
    # This command is overridden by setup.sh to run a test prompt.
    command: tail -f /dev/null
    depends_on:
      panopticon:
        condition: service_healthy
    restart: unless-stopped

volumes:
  panopticon-data:
  pi-workspace:
